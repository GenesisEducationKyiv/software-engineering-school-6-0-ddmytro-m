      value: github.com/GenesisEducationKyiv/software-engineering-school-6-0-ddmytro-m/internal/api/grpcgen
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.10
    out: internal/api/grpcgen
    opt: paths=source_relative
