filebeat.inputs:
  - type: container
    paths:
      - /var/lib/docker/containers/*/*.log

processors:
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"
  - decode_json_fields:
      fields: ["message"]
      target: ""
      overwrite_keys: true

output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  index: "github-scanner-logs-%{+yyyy.MM.dd}"

setup.template.name: "github-scanner-logs"
setup.template.pattern: "github-scanner-logs-*"
setup.ilm.enabled: false

logging.level: warning
logging.to_files: false