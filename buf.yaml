version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  except:
    # We deliberately reuse a single DeliveryCommand/SendResult pair across the
    # unary and streaming RPCs instead of per-method request/response messages.
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
breaking:
  use:
    - FILE
