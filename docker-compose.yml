services:
  app:
    profiles:
      - app
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_USER=scanner_user
      - DB_PASSWORD=scanner_pass
      - DB_NAME=github_scanner
      - DB_PORT=5432
      - REDIS_ADDR=redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - RABBITMQ_MAX_RETRY_ATTEMPTS
      - RABBITMQ_RETRY_TTL_SECONDS
      - RABBITMQ_RETRY_BACKOFF_FACTOR

      - APP_ENV
      - LOG_LEVEL
      - GITHUB_TOKEN
      - GITHUB_TIMEOUT_SECONDS
      - GITHUB_CACHE_TTL_SECONDS
      - GITHUB_CACHE_ERROR_TTL_SECONDS

      - SCANNER_WORKERS
      - SCANNER_QUEUE_SIZE
      - SCANNER_SAFETY_BUFFER
      - SCANNER_PRODUCER_INTERVAL_SECONDS
      - SCANNER_MIN_INTERVAL_SECONDS

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  mailer:
    profiles:
      - app
    build:
      context: .
      dockerfile: Dockerfile
      target: mailer
    restart: unless-stopped
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - RABBITMQ_MAX_RETRY_ATTEMPTS
      - RABBITMQ_RETRY_TTL_SECONDS
      - RABBITMQ_RETRY_BACKOFF_FACTOR

      - APP_ENV
      - MAILER_WORKERS
      - MAILER_PREFETCH_COUNT
      - SMTP_HOST
      - SMTP_PORT
      - SMTP_USER
      - SMTP_PASS
      - SMTP_FROM
      - SMTP_SENDER_EMAIL

    depends_on:
      rabbitmq:
        condition: service_healthy

  notifier:
    profiles:
      - app
    build:
      context: .
      dockerfile: Dockerfile
      target: notifier
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - RABBITMQ_MAX_RETRY_ATTEMPTS
      - RABBITMQ_RETRY_TTL_SECONDS
      - RABBITMQ_RETRY_BACKOFF_FACTOR

      - APP_ENV
      - NOTIFIER_WORKERS
      - NOTIFIER_PREFETCH_COUNT
      - NOTIFIER_DEDUP_TTL_HOURS

    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  test:
    profiles:
      - test
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: go test -v -tags="unit,integration" ./...
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scanner_user
      POSTGRES_PASSWORD: scanner_pass
      POSTGRES_DB: github_scanner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanner_user -d github_scanner"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.4
    user: root
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["--strict.perms=false"]
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:v2.51.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  elasticsearch_data:
  grafana_data:
  prometheus_data:
