services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_USER=scanner_user
      - DB_PASSWORD=scanner_pass
      - DB_NAME=github_scanner
      - DB_PORT=5432
      - REDIS_ADDR=redis:6379

      - APP_ENV
      - LOG_LEVEL
      - GITHUB_TOKEN
      - GITHUB_TIMEOUT_SECONDS
      - GITHUB_CACHE_TTL_SECONDS
      - GITHUB_CACHE_ERROR_TTL_SECONDS

      - SCANNER_WORKERS
      - SCANNER_QUEUE_SIZE
      - SCANNER_SAFETY_BUFFER
      - SCANNER_PRODUCER_INTERVAL_SECONDS
      - SCANNER_MIN_INTERVAL_SECONDS

      - SMTP_HOST
      - SMTP_PORT
      - SMTP_USER
      - SMTP_PASS
      - SMTP_FROM

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scanner_user
      POSTGRES_PASSWORD: scanner_pass
      POSTGRES_DB: github_scanner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanner_user -d github_scanner"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
