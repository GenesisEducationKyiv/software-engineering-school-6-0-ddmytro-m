name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  proto:
    name: Proto
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint protos and check breaking changes
        uses: bufbuild/buf-action@v1
        with:
          version: "1.50.0"
          push: false
          archive: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.1

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Run unit tests
        run: make test:unit

      - name: Run integration tests
        run: make test:integration
